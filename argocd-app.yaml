apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-proj-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/arpitamisal/Devops_Proj"
    targetRevision: HEAD
    path: devops-proj-application
  destination:
    server: "https://kubernetes.default.svc"
    namespace: devops-proj-application
  syncPolicy:
    automated:
      prune: true
      selfHeal: true  