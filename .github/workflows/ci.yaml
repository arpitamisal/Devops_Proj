---

name: Complete DevOps Project Pipeline

on: 
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set Short SHA
        run: |
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV 

      - name: Build Docker Image
        run: |
          docker build -t arpitamisal/devops-proj:${{ env.SHORT_SHA }} . 
      
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin 
        
      - name: Push Docker Image
        run: |
          docker push arpitamisal/devops-proj:${{ env.SHORT_SHA }}
        
      - name: Configure Git Author
        run: |
          git config --local user.name "arpitamisal"
          git config --local user.email "arpitamisal2003@gmail.com"

      - name: Update Helm Chart with new image tag
        run: |
          sed -i "s/tag:.*/tag: ${{ env.SHORT_SHA }}/" ./devops-proj-application/values.yaml
          git add ./devops-proj-application/values.yaml
          git commit -m "Update image tag to ${{ env.SHORT_SHA }}"
          git push origin main